<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloodKH — Phnom Penh Flood Monitor</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin="">

    <!-- Google Fonts: Noto Sans Khmer -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Local CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <div class="header-brand">
            <h1>FloodKH</h1>
            <span class="header-subtitle" data-i18n="subtitle">Phnom Penh Flood Monitor</span>
        </div>
        <nav>
            <button class="nav-btn active" data-view="map" data-i18n="nav_map">Map</button>
            <button class="nav-btn" data-view="dashboard" data-i18n="nav_dashboard">Dashboard</button>
            <a href="methodology.html" class="nav-btn" data-i18n="nav_methodology">Methodology</a>
        </nav>
        <div class="header-controls">
            <button id="lang-toggle" class="lang-btn">ខ្មែរ</button>
            <span class="last-updated" data-i18n="last_updated">Last updated:</span>
            <span id="update-time">--</span>
        </div>
    </header>

    <main>
        <div id="sidebar" class="sidebar">
            <!-- Mobile drag handle -->
            <div class="sidebar-handle" id="sidebar-toggle">
                <span class="handle-bar"></span>
            </div>

            <!-- Summary cards -->
            <div class="summary-cards">
                <div class="summary-card level-0">
                    <span class="card-count" id="count-normal">0</span>
                    <span data-i18n="normal">Normal</span>
                </div>
                <div class="summary-card level-1">
                    <span class="card-count" id="count-watch">0</span>
                    <span data-i18n="watch">Watch</span>
                </div>
                <div class="summary-card level-2">
                    <span class="card-count" id="count-warning">0</span>
                    <span data-i18n="warning">Warning</span>
                </div>
                <div class="summary-card level-3">
                    <span class="card-count" id="count-emergency">0</span>
                    <span data-i18n="emergency">Emergency</span>
                </div>
            </div>

            <!-- Timeline slider -->
            <div class="timeline-section">
                <h3 data-i18n="forecast_timeline">72-Hour Forecast</h3>
                <div class="timeline-slider">
                    <input type="range" id="time-slider" min="0" max="3" step="1" value="0">
                    <div class="timeline-labels">
                        <span class="active">Now</span>
                        <span>+24h</span>
                        <span>+48h</span>
                        <span>+72h</span>
                    </div>
                </div>
            </div>

            <!-- District ranking -->
            <div class="district-list">
                <h3 data-i18n="highest_risk">Highest Risk Districts</h3>
                <div id="district-ranking"></div>
            </div>

            <!-- River gauge -->
            <div class="river-section">
                <h3 data-i18n="river_level">Mekong River Level</h3>
                <div id="river-gauge"></div>
            </div>

            <!-- Data source status -->
            <div class="source-status">
                <h3 data-i18n="data_sources">Data Sources</h3>
                <div id="source-indicators"></div>
            </div>
        </div>

        <div id="map-container"></div>

        <div id="dashboard-view" class="dashboard-view hidden">
            <!-- Charts and detailed view rendered by dashboard.js -->
        </div>
    </main>

    <footer>
        <span>Built by <strong>Convergence</strong></span>
        <span>Data: Open-Meteo, Copernicus Sentinel, NASA GPM, GloFAS</span>
    </footer>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <!-- Local JS -->
    <script src="js/i18n.js"></script>
    <script src="js/map.js"></script>
    <script src="js/timeline.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
